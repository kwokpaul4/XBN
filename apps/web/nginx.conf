# nginx config for the XBN web portal image.
# - Serves the built SPA out of /usr/share/nginx/html
# - Proxies API paths to the api container. The container name `api` matches
#   the service name in docker-compose.yml. When deploying behind a real
#   ingress, replace the `proxy_pass` target with the API's internal URL.

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Static assets — long cache; index.html is exempt so redeploys take effect.
  location ~* \.(?:css|js|woff2?|png|jpg|jpeg|gif|svg)$ {
    expires 30d;
    try_files $uri =404;
  }

  # API surface — proxy to the api service.
  location ~ ^/(auth|me|network|documents|attachments|health|ready) {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback — every other route serves index.html so React Router can
  # take over.
  location / {
    try_files $uri /index.html;
  }
}
