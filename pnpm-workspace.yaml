packages:
  - 'apps/*'
  - 'packages/*'

# Build scripts approved to run during `pnpm install`. pnpm 11+ blocks native
# postinstall scripts by default; we whitelist the ones we trust.
allowBuilds:
  '@prisma/engines': true
  cpu-features: true
  esbuild: true
  prisma: true
  protobufjs: true
  ssh2: true
